name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration Release --no-restore

    - name: Publish win-x64
      run: dotnet publish ColorEcho/ColorEcho.csproj -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o publish/win-x64

    - name: Publish win-arm64
      run: dotnet publish ColorEcho/ColorEcho.csproj -c Release -r win-arm64 --self-contained true -p:PublishSingleFile=true -o publish/win-arm64

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ColorEcho
        path: publish/
