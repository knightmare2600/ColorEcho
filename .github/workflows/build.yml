name: Build ColorEcho

on:
  workflow_dispatch:  # manual trigger
  push:
    branches: [ main ] # runs on push
  pull_request:       # runs on PRs

jobs:
  build:
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true  # future-proof Node.js 24

    strategy:
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'  # switch to 7.0.x if 8.0 not available yet

      - name: Restore
        run: dotnet restore ColorEcho.sln

      - name: Publish (${{ matrix.rid }})
        run: |
          dotnet publish ColorEcho.csproj -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishSingleFile=true -v:detailed

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ColorEcho-${{ matrix.rid }}
          path: bin/Release/**/${{ matrix.rid }}/publish/*
