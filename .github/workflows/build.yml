name: Build ColorEcho

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      # 1️⃣ Checkout repo
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup .NET SDK
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # 3️⃣ Show .NET info for debugging
      - name: Show .NET info
        run: dotnet --info

      # 4️⃣ Restore NuGet packages (PowerShell syntax)
      - name: Restore
        working-directory: src
        shell: pwsh
        run: |
          dotnet restore ColorEcho.sln

      # 5️⃣ Build solution
      - name: Build
        working-directory: src
        shell: pwsh
        run: |
          dotnet build ColorEcho.sln -c Release --no-restore

      # 6️⃣ Publish self-contained single-file executables (SDK-style only)
      - name: Publish (${{ matrix.rid }})
        working-directory: src
        shell: pwsh
        run: |
          if (Test-Path "ColorEcho.csproj") {
              dotnet publish ColorEcho.csproj -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishSingleFile=true
          } else {
              Write-Host "Publish skipped: project is not SDK-style"
          }

      # 7️⃣ List publish output for debugging
      - name: List output
        working-directory: src
        shell: pwsh
        run: |
          Get-ChildItem -Recurse bin\Release

      # 8️⃣ Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ColorEcho-${{ matrix.rid }}
          path: src/bin/Release/**/publish/*
