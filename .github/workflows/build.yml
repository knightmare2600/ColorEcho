name: Build ColorEcho

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      # 1️⃣ Checkout the repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup MSBuild (Visual Studio Build Tools)
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      # 3️⃣ Restore NuGet packages for .NET Framework solution
      - name: Restore NuGet packages
        working-directory: src
        run: nuget restore ColorEcho.sln

      # 4️⃣ Build solution using MSBuild
      - name: Build with MSBuild
        working-directory: src
        run: msbuild ColorEcho.sln /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal

      # 5️⃣ (Optional) Publish self-contained single file executables if supported
      # Note: Only works if ColorEcho.csproj is SDK-style compatible; otherwise skip
      - name: Publish (${{ matrix.rid }})
        working-directory: src
        run: |
          if exist ColorEcho.csproj (
            dotnet publish ColorEcho.csproj -c Release -r ${{ matrix.rid }} --self-contained true /p:PublishSingleFile=true
          ) else (
            echo "Publish skipped: project is not SDK-style"
          )

      # 6️⃣ Upload binaries as artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ColorEcho-${{ matrix.rid }}
          path: |
            src\bin\Release\*
