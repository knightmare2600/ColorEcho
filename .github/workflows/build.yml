name: Build ColorEcho

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout
        uses: actions/checkout@v4

      # 2️⃣ Setup MSBuild (full .NET Framework)
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1

      # 3️⃣ Restore NuGet packages
      - name: Restore NuGet packages
        working-directory: src
        shell: pwsh
        run: |
          nuget restore ColorEcho.sln

      # 4️⃣ Build solution using full MSBuild
      - name: Build with MSBuild
        working-directory: src
        shell: pwsh
        run: |
          msbuild ColorEcho.sln /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal

      # 5️⃣ Optional: Publish step is just copying bin\Release for classic .NET Framework
      - name: Prepare artifacts
        working-directory: src
        shell: pwsh
        run: |
          $publishPath = "bin\Release"
          if (Test-Path $publishPath) {
              Write-Host "Found release binaries in $publishPath"
          } else {
              Write-Host "No release binaries found, check MSBuild logs"
              exit 1
          }

      # 6️⃣ Upload artifacts
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ColorEcho-${{ matrix.rid }}
          path: src/bin/Release/*
