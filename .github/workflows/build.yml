name: Build ColorEcho

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]
  pull_request:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        rid: [win-x64, win-arm64]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Show .NET info (debug)
        run: dotnet --info

      - name: Restore
        run: dotnet restore ColorEcho.sln

      - name: Build
        run: dotnet build ColorEcho.sln -c Release --no-restore

      - name: Publish (${{ matrix.rid }})
        run: >
          dotnet publish ColorEcho.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          /p:PublishSingleFile=true
          --no-build

      - name: List output (debug)
        run: dir -Recurse

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ColorEcho-${{ matrix.rid }}
          path: |
            **/publish/*
