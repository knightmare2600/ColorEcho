name: Build and Release ColorEcho

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

# 👇 Opt into Node 24 early (removes deprecation warnings)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        rid: [win-x64, win-x86, win-arm64]

    steps:
      # 1️⃣ Checkout
      - name: Checkout
        uses: actions/checkout@v5

      # 2️⃣ Setup MSBuild
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 3️⃣ Restore NuGet packages
      - name: Restore NuGet
        working-directory: src
        shell: pwsh
        run: nuget restore ColorEcho.sln

      # 4️⃣ Build solution
      - name: Build with MSBuild
        working-directory: src
        shell: pwsh
        run: msbuild ColorEcho.sln /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal

      # 5️⃣ Create ZIP (stable pathing)
      - name: Zip Artifact
        working-directory: src
        shell: pwsh
        run: |
          $outDir = "bin\Release"
          $zipPath = "$outDir\ColorEcho-${{ matrix.rid }}.zip"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path "$outDir\*" -DestinationPath $zipPath
          Write-Host "Created $zipPath"

      # 6️⃣ Upload artifact (flat, predictable)
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ColorEcho-${{ matrix.rid }}
          path: src/bin/Release/ColorEcho-${{ matrix.rid }}.zip
          if-no-files-found: error


  release:
    runs-on: windows-latest
    needs: build

    steps:
      # 1️⃣ Checkout
      - name: Checkout
        uses: actions/checkout@v5

      # 2️⃣ Download all artifacts (flattened structure)
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts
          merge-multiple: true

      # 3️⃣ Create GitHub Release (modern replacement)
      - name: Create Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ColorEcho v1.0.${{ github.run_number }}
          body: Automated release with x64 and ARM builds.
          files: |
            ./artifacts/ColorEcho-win-x64.zip
            ./artifacts/ColorEcho-win-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
