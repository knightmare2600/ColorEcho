name: Build and Release ColorEcho

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

# 🔧 Future-proof Node 24 opt-in (prevents deprecation warnings)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-2025

    strategy:
      matrix:
        rid: [win-x86, win-x64, win-arm64]

    steps:
      # 1️⃣ Checkout source
      - name: Checkout
        uses: actions/checkout@v5

      # 2️⃣ Setup MSBuild
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # 3️⃣ Restore NuGet
      - name: Restore NuGet
        working-directory: src
        shell: pwsh
        run: nuget restore ColorEcho.sln

      # 4️⃣ Build solution
      - name: Build with MSBuild
        working-directory: src
        shell: pwsh
        run: msbuild ColorEcho.sln /p:Configuration=Release /p:Platform="Any CPU" /verbosity:minimal

      # 5️⃣ Create ZIP per RID
      - name: Create ZIP
        working-directory: src
        shell: pwsh
        run: |
          $outDir = "bin\Release"
          $zipPath = "$outDir\ColorEcho-${{ matrix.rid }}.zip"

          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }

          Compress-Archive -Path "$outDir\*" -DestinationPath $zipPath
          Write-Host "Created $zipPath"

      # 6️⃣ Upload artifact (explicit + reliable)
      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ColorEcho-${{ matrix.rid }}
          path: src/bin/Release/ColorEcho-${{ matrix.rid }}.zip
          if-no-files-found: error


  release:
    runs-on: windows-2025
    needs: build

    steps:
      # 1️⃣ Checkout (required for release action metadata)
      - name: Checkout
        uses: actions/checkout@v5

      # 2️⃣ Download artifacts (flattened for simplicity)
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: ./artifacts
          merge-multiple: true

      # 3️⃣ Create GitHub Release + upload assets (modern)
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: ColorEcho v1.0.${{ github.run_number }}
          body: |
            Automated release:
            - win-x86
            - win-x64
            - win-arm64

          files: |
            ./artifacts/ColorEcho-win-x86.zip
            ./artifacts/ColorEcho-win-x64.zip
            ./artifacts/ColorEcho-win-arm64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
