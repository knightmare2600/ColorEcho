name: Build ColorEcho

on:
workflow_dispatch:
push:
branches: [ main ]
pull_request:

jobs:
build:
runs-on: windows-latest

```
strategy:
  matrix:
    rid: [win-x64, win-arm64]

steps:
- name: Checkout
  uses: actions/checkout@v4

- name: Setup .NET
  uses: actions/setup-dotnet@v4
  with:
    dotnet-version: '8.0.x'

- name: Restore
  run: dotnet restore

- name: Publish (${{ matrix.rid }})
  run: >
    dotnet publish
    -c Release
    -r ${{ matrix.rid }}
    --self-contained true
    /p:PublishSingleFile=true

- name: Upload artifact
  uses: actions/upload-artifact@v4
  with:
    name: ColorEcho-${{ matrix.rid }}
    path: |
      **/bin/Release/**/${{ matrix.rid }}/publish/*
```
